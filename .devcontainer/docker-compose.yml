version: "3.7"

services:

  db:
    image: mariadb:11
    restart: unless-stopped
    volumes:
      - ./db-setup.sh:/docker-entrypoint-initdb.d/db-setup.sh
      - ../resources/db:/docker-entrypoint-initdb.d/scripts/db:ro
      - ../db-dev-setup.sql:/docker-entrypoint-initdb.d/scripts/db-dev-setup.sql:ro
      - ../db-init.sql:/docker-entrypoint-initdb.d/scripts/db-init.sql:ro
      - db:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root

  devcontainer:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../:/workspace:cached
      - ./config.ini:/workspace/config/config.ini
    network_mode: service:db
    command: sleep infinity

volumes:

  db: